name: Advanced CI/CD Pipeline

on:
  pull_request:
    branches: [main,master]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build
        run: docker build -t app .

      - name: Run Tests
        run: npm test

      - name: SonarQube Scan
        run: sonar-scanner

      - name: Security Scan
        run: trivy image app

      - name: Push Image
        run: docker push app

  cd:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Update GitOps Repo
        run: |
          sed -i 's/tag:.*/tag: latest/' deployment.yaml
          git commit -am "Update image"
          git push
