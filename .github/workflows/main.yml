name: CI/CD Pipeline

on:
  push:
    branches: [ main,master, ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest


    steps:

    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Dependencies
      run: npm install || echo "No dependencies"

    - name: Run Tests
      run: npm test || echo "Tests skipped"

    - name: Build Docker Image
      run: docker build -t photo-studio-app .

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Push Image
      run: |
        docker tag fitness-app ${{ secrets.DOCKERHUB_USERNAME }}/photo-app-app:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/photo-app-app:latest
        
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ap-south-1

    - name:  Install kubectl
      run: |
       curl -LO https://storage.googleapis.com/kubernetes-release/release/v1.31.0/bin/linux/amd64/kubectl  
       chmod +x kubectl
       sudo  mv kubectl /usr/local/bin/

    - name: update kube config
      run: aws eks update-kubeconfig --name venkey-cluster --region ap-south-1
      
    - name: Deploy to EKS
      run: |
        kubectl apply -f app-deployment.yaml
        kubectl apply -f mongodb-deployment.yaml
        kubectl apply -f sonar-deployment.yaml